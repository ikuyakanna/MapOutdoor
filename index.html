<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0f" />
  <title>路線 証アプリ（試作）</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="路線証">
</head>
<body>

  <!-- ハンバーガー -->
  <button id="menuButton" class="menuButton" aria-label="路線メニューを開く">
    <span></span><span></span><span></span>
  </button>

  <!-- サイドメニュー -->
  <aside id="sideMenu" class="sideMenu" aria-label="路線一覧">
    <div class="sideMenu__header">
      <div class="sideMenu__title">路線を選択</div>
      <div class="sideMenu__sub">達成率（達成駅数/全駅）</div>
    </div>
    <div id="lineList" class="lineList"></div>
  </aside>

  <!-- 画面暗転（右側タップで閉じる） -->
  <div id="overlay" class="overlay" aria-hidden="true"></div>

  <!-- 編集バー（PC用） -->
  <div id="editorBar" class="editorBar">
    <button id="toggleEditBtn" class="btn btn--solid" type="button">編集モード：OFF</button>
    <label class="chk"><input id="gridToggle" type="checkbox" /> グリッド</label>
    <label class="chk"><input id="snapToggle" type="checkbox" checked /> スナップ</label>
    <button id="copyJsonBtn" class="btn btn--ghost" type="button">配置JSONをコピー</button>
    <button id="downloadJsonBtn" class="btn btn--ghost" type="button">配置JSONをDL</button>
    <div id="editorHint" class="editorHint">OFF：駅をタップして証を追加できます</div>
  </div>

  <!-- 未選択メッセージ -->
  <div id="emptyState" class="emptyState hidden">路線図を選択してください</div>

  <!-- 路線図 -->
  <main class="main">
    <svg id="oedoSvg" class="routeSvg" viewBox="0 0 390 844" role="img" aria-label="路線図"></svg>
  </main>

  <!-- 駅詳細シート -->
  <section id="sheet" class="sheet hidden" aria-label="駅詳細">
    <!-- 固定ヘッダー -->
    <div class="sheet__header">
      <div>
        <div id="stationName" class="sheet__title">駅名</div>
        <div id="stationStatus" class="sheet__sub">未達成</div>
      </div>
      <button id="closeSheetBtn" class="btn btn--ghost" type="button">閉じる</button>
    </div>

    <!-- 固定：アクション（証を追加） -->
    <div class="sheet__actions">
      <button id="addProofBtn" class="btn btn--solid" type="button">証を追加</button>
    </div>

    <!-- ★ここだけスクロール -->
    <div class="sheet__body">

      <!-- 一覧ビュー -->
      <div id="proofListView" class="proofListView">
        <div id="proofList" class="proofList"></div>
      </div>

      <!-- 詳細ビュー（画像を大きく） -->
      <div id="proofDetailView" class="proofDetailView hidden" aria-label="証の詳細">
        <div class="proofDetailHeader">
  <button id="backToListBtn" class="btn btn--ghost" type="button">一覧へ</button>

  <div class="proofDetailMeta">
    <div id="proofDetailDate" class="proofDetailDate">--月--日</div>
    <div id="proofDetailStars" class="proofDetailStars">☆☆☆☆☆</div>
  </div>

  <div style="display:flex; gap:8px;">
    <button id="editProofBtn" class="btn btn--ghost" type="button">修正</button>
    <button id="deleteProofBtn" class="btn btn--ghost" type="button">削除</button>
  </div>
</div>

        <div class="proofDetailBody">
          <img id="proofDetailImg" class="proofDetailImg" alt="証の写真">
        </div>

        <div id="proofDetailComment" class="proofDetailComment"></div>
      </div>

    </div>
  </section>

  <!-- 証追加モーダル -->
  <section id="modal" class="modal hidden" aria-label="証追加">
    <div class="modal__backdrop"></div>

    <div class="modal__panel" role="dialog" aria-modal="true">
      <div class="modal__header">
        <div class="modal__title">証を追加</div>
        <button id="closeModalBtn" class="btn btn--ghost" type="button">閉じる</button>
      </div>

      <div class="modal__body">
        <!-- コメント（1行） → タイトル（必須） -->
<div class="row">
  <div class="row__label">タイトル（必須）</div>
  <input id="titleInput" class="textInput" type="text" maxlength="60" placeholder="例：○○でご飯！">
</div>

        <!-- お気に入り度 -->
        <div class="row">
          <div class="row__label">お気に入り度</div>
          <div class="starPicker" role="radiogroup" aria-label="お気に入り度">
            <button class="starBtn" type="button" data-star="1" aria-label="1">★</button>
            <button class="starBtn" type="button" data-star="2" aria-label="2">★</button>
            <button class="starBtn" type="button" data-star="3" aria-label="3">★</button>
            <button class="starBtn" type="button" data-star="4" aria-label="4">★</button>
            <button class="starBtn" type="button" data-star="5" aria-label="5">★</button>
            <div id="starPreview" class="starPreview">☆☆☆☆☆</div>
          </div>
        </div>

        <!-- 写真（必須） -->
        <div class="row">
          <div class="row__label">写真（必須）</div>

          <div class="row__controls row__controls--photo">
            <!-- 本体inputは隠す -->
            <input id="photoInputFile" class="fileInputHidden" type="file" accept="image/*" />
            <input id="photoInputCamera" class="fileInputHidden" type="file" accept="image/*" capture="environment" />

            <!-- 見た目はボタン -->
            <button id="pickPhotoBtn" class="photoBtn" type="button">
              <span class="photoBtn__icon" aria-hidden="true">🖼️</span>
              <span class="photoBtn__text">写真を選択</span>
            </button>

            <button id="takePhotoBtn" class="photoBtn photoBtn--primary" type="button">
              <span class="photoBtn__icon" aria-hidden="true">📷</span>
              <span class="photoBtn__text">写真を撮る</span>
            </button>
          </div>
        </div>

        <div id="photoPreviewWrap" class="photoPreviewWrap hidden">
          <div class="photoPreviewBtns">
            <button id="reselectBtn" class="btn btn--ghost" type="button">選びなおす</button>
            <button id="clearPhotoBtn" class="btn btn--ghost" type="button">クリア</button>
          </div>
          <div id="photoPreviewInner" class="photoPreviewInner"></div>
        </div>

      </div>

      <div class="modal__footer">
        <button id="saveProofBtn" class="btn btn--primary" type="button">保存</button>
      </div>
    </div>
  </section>

  <script src="./app.js"></script>
</body>
</html>
