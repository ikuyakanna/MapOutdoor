<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>大江戸線 証アプリ（SVG試作）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="title">大江戸線｜駅制覇（SVG試作）</div>
  <div class="subtitle">駅をタップ → 証を残す（写真必須）</div>
</header>

<main class="main">
  <!-- 編集バー（PCで調整用） -->
<section class="editorBar" id="editorBar">
  <button class="btn btn--ghost" id="toggleEditBtn" type="button">編集モード：OFF</button>
  <button class="btn btn--ghost" id="copyJsonBtn" type="button">配置JSONをコピー</button>
  <button class="btn btn--ghost" id="downloadJsonBtn" type="button">JSONを保存</button>
  <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
  <input type="checkbox" id="gridToggle">
  グリッド表示
</label>

<label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">
  <input type="checkbox" id="snapToggle" checked>
  グリッド吸着
</label>
  <span class="editorHint" id="editorHint">編集モードONで駅をドラッグできます</span>
</section>
  <!-- 自前の簡易路線図（SVG） -->
  <div class="mapWrap">
    <svg id="oedoSvg" class="oedoSvg" viewBox="0 0 390 844" role="img" aria-label="都営大江戸線（簡易路線図）">
      <!-- app.js が中身を描画します -->
    </svg>
  </div>

  <!-- 駅詳細シート -->
  <section id="sheet" class="sheet hidden">
    <div class="sheet__handle"></div>

    <div class="sheet__header">
      <div>
        <div id="stationName" class="sheet__title"></div>
        <div id="stationStatus" class="sheet__status"></div>
      </div>
      <button id="closeSheetBtn" class="btn btn--ghost" type="button">閉じる</button>
    </div>

    <div class="sheet__actions">
      <button id="addProofBtn" class="btn btn--primary" type="button">証を追加</button>
    </div>

    <div class="sheet__section">
      <div class="sheet__sectionTitle">この駅の証</div>
      <div id="proofList" class="proofList"></div>
    </div>
  </section>

  <!-- 投稿モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal__backdrop"></div>

    <div class="modal__panel">
      <div class="modal__header">
        <div class="modal__title">証を追加</div>
        <button id="closeModalBtn" class="btn btn--ghost" type="button">閉じる</button>
      </div>

      <div class="form">
        <label class="field">
          <div class="field__label">写真（必須）</div>

          <div class="photoButtons">
            <label class="btn btn--ghost">
              📁 アルバム
              <input id="photoInputFile" type="file" accept="image/*" hidden>
            </label>

            <label class="btn btn--ghost">
              📷 カメラ
              <input id="photoInputCamera" type="file" accept="image/*" capture="environment" hidden>
            </label>
          </div>

          <div id="photoPreviewWrap" class="photoPreview hidden">
            <div class="photoPreview__top">
              <button id="reselectBtn" class="btn btn--ghost" type="button">選びなおす</button>
              <button id="clearPhotoBtn" class="btn btn--ghost" type="button">消す</button>
            </div>
            <div id="photoPreviewInner"></div>
          </div>
        </label>

        <label class="field">
          <div class="field__label">コメント</div>
          <textarea id="commentInput" rows="3" placeholder="例：ラーメン最高、など"></textarea>
        </label>

        <div class="form__row">
          <button id="saveProofBtn" class="btn btn--primary" type="button">保存</button>
          <div id="formError" class="formError hidden"></div>
        </div>

        <div class="hint">
          ※ 保存先はこのブラウザ（localStorage）です。別端末には引き継がれません。
        </div>
      </div>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
